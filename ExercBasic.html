<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <meta charset="UTF-8">
 <title>Prática de JavaScript</title>
</head>
<body>
  <h2>1) Verificar se um número é par ou ímpar</h2>
  <label>Digite o numero: </label>
  <input type="number" id="num">
  <button onclick="verificar()">Verificar</button>
  <p id = "resultado"></p> 


 <h2>2) Calcular media de tres notas</h2>
 <label>Digite a 1 nota: </label>
 <input type="number" id="n1"><br>
 <label>Digite a 2 nota: </label>
 <input type="number" id="n2"><br>
 <label>Digite a 3 nota: </label> 
 <input type="number" id="n3"><br>
 <button onclick ="media()">Calcular</button>
 <p id = "resultado2"></p>

 <h2>Converter Celsiu em Fahrenheit</h2>
 <label>Informe o celcius: </label>
 <input type = "number" step="0.1" id= "temp"><br>
 <button onclick="celcius()">Converter</button><br>
 <p id = "resultado3"></p>
 
 <h2>Tabuada de um numero</h2>   
 <label>Informe um numero: </label>
 <input type = "number" id = "tab"><br>
 <button onclick ="tabuada()">Calcular</button><br>
 <p id = "resultado4"></p>

 <h2>Verificar se uma pessoa pode votar</h2>
 <label>Informe a idade: </label>
 <input type = "number" id = "idade">
 <button onclick ="verificarIdade()">Verificar</button>
 <p id = "resultado5"></p>

 <h2>Calcular a area de um retangulo</h2>
 <label>Informe o base: </label>
 <input type = "number" id = "base">
 <label>Altura: </label>
 <input type = "number" id = altura> 
 <button onclick= "areaRetangulo()">calcular</button>
 <p id= "resultado6"></p>

 <h2>Contagem regressiva</h2>
 <label>Informe o numero: </label>
 <input type = "number" id = "contagemRegressiva">
 <button onclick = "contagemRegressiva()">calcular</button>
 <p id = "resultado7"></p>
 <script>
  
 // Ex 1 
   function verificar(){
   let numero = Number(document.getElementById("num").value);
   if (numero % 2 === 0){
   document.getElementById("resultado").innerText = "O numero " + numero + " é par";
    } else{
   document.getElementById("resultado").innerText = "o numero" + numero + "é impar"; 
   }
   }

  // Ex 2
  function media(){
  let n1 = Number(document.getElementById("n1").value);
  let n2 = Number(document.getElementById("n2").value);
  let n3 = Number(document.getElementById("n3").value);
  let media = (n1 + n2 + n3) / 3;
  document.getElementById("resultado2").innerText = "A média é: " + media.toFixed(2);
  }

  // Ex 3
  function celcius(){
  let temp = Number(document.getElementById("temp").value);
  let fah = (temp * 1.8) + 32;
  document.getElementById("resultado3").innerText = fah.toFixed(2); 
  }

  function tabuada(){
  let num = Number(document.getElementById("tab").value);
  let resultado = "";
  for(let i = 1; i <= 10; i++){
  resultado += num + "x" + i + "=" + (num * i) + "<br>";
  } 
  document.getElementById("resultado4").innerHTML = resultado;  
  }

  function verificarIdade(){
  let valor = Number(document.getElementById("idade").value);
  if((valor !== "" && !isNaN(valor) && Number(valor) >= 16){
   document.getElementById("resultado5").innerHTML = "Você pode votar";
  } else{document.getElementById("resultado5").innerHTML = "Você não pode votar";}
  }

  function areaRetangulo(){
  let base = Number(document.getElementById("base").value);
  let altura = Number(document.getElementById("altura"));
  let resultado = base * altura;
  document.getElementById("resultado6").innerHTML = resultado.toFixed(2);
  }
  
  function contagemRegressiva(){
  let num = parseInt(document.getElementById("contagemRegressiva").value);
  let result = "";
  for (let i = num; i >= 0; i--){
   result += i + " ";
  } 
   document.getElementById("resultado7").innerText = result;
  }
   </script>


  
</body>
 </html>
