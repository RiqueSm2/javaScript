<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <meta charset="UTF-8">
 <title>Prática de JavaScript</title>
</head>
<body>
  <h2>1) Verificar se um número é par ou ímpar</h2>
  <label>Digite o numero: </label>
  <input type="number" id="num">
  <button onclick="verificar()">Verificar</button>
  <p id = "resultado"></p> 


  <h2>2) Calcular media de tres notas</h2>
 <label>Digite a 1 nota: </label>
 <input type="number" id="n1"><br>
 <label>Digite a 2 nota: </label>
 <input type="number" id="n2"><br>
 <label>Digite a 3 nota: </label> 
 <input type="number" id="n3"><br>

 <button onclick ="media()">Calcular</button>
 <p id = "resultado2"></p>
 
    

 <script>
 // Ex 1 
   function verificar(){
   let numero = Number(document.getElementById("num").value);
   if (numero % 2 === 0){
   document.getElementById("resultado").innerText = "O numero " + numero + " é par";
    } else{
   document.getElementById("resultado").innerText = "o numero" + numero + "é impar"; 
   }
   }

  // Ex 2
  function media(){
  let n1 = Number(document.getElementById("n1").value);
  let n2 = Number(document.getElementById("n2").value);
  let n3 = Number(document.getElementById("n3").value);
  let media = (n1 + n2 + n3) / 3;
  document.getElementById("resultado2").innerText = "A média é: " + media.toFixed(2);
    }
  
 </script>


  
</body>
 </html>
